name: CICD_test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: action/setup-python@v4
      with:
        python-version: 3.10

    - name: Run tests
      run: python test.py
